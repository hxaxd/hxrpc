# 测试所用配置文件信息
rpcserverip=127.0.0.1
rpcserverport=8000
zookeeperip=127.0.0.1
zookeeperport=2181

# Benchmark 测试配置
# 并发连接数 (根据内存调整: 2G建议2000-3000, 4G+可10000+)
concurrency=3000

# 每个连接发送的请求数
requests_per_conn=25

# 是否使用 epoll 客户端 (true=单线程高并发, false=多线程)
use_epoll=true

# 预建立连接数量
preconnect=1000

# 输出详细日志 (true/false)
verbose=false
