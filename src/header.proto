syntax = "proto3";

package hxrpc;

message RpcHeader {
  uint64 request_id = 1;
  bytes service_name = 2;
  bytes method_name = 3;
  uint32 args_size = 4;
  uint32 meta_size = 5;
}

message RpcResponseHeader {
  uint64 request_id = 1;
  int32 status_code = 2;
  bytes error_text = 3;
  uint32 payload_size = 4;
}
