# ==========================================
# hxrpc 测试配置文件 (test.conf)
# ==========================================

# 1. RPC 服务端配置 (服务端绑定的IP和端口，客户端连接的地址)
rpcserverip=127.0.0.1
rpcserverport=8000

# 2. Zookeeper 配置 (服务注册中心的地址)
zookeeperip=127.0.0.1
zookeeperport=2181

# ==========================================
# 3. 性能压测专用配置 (默认参数)
# ==========================================

# 默认并发连接数 (模拟同时在线的客户端数量)
concurrency=10000

# 每个连接发送的请求数量 (单客户端连续发送次数)
requests_per_conn=1
